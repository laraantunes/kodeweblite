<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <defs>
        <!-- Background radial gradient -->
        <radialGradient id="bgGrad" cx="50%" cy="30%" r="75%">
            <stop offset="0%" stop-color="#260b3c" />
            <stop offset="100%" stop-color="#07010e" />
        </radialGradient>
        
        <!-- Text linear gradient for W -->
        <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#bd00ff" />
            <stop offset="100%" stop-color="#00ff88" />
        </linearGradient>
        
        <!-- Glowing effect filter -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="10" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    
    <!-- Background Card -->
    <rect width="512" height="512" rx="110" fill="url(#bgGrad)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="6"/>
    
    <!-- Outer Browser Window Outline -->
    <rect x="56" y="56" width="400" height="400" rx="40" fill="none" stroke="rgba(189, 0, 255, 0.15)" stroke-width="4" />
    
    <!-- Code Editor Brackets (Neon effects) -->
    <!-- Left bracket < (Purple glow) -->
    <path d="M 125 190 L 75 256 L 125 322" fill="none" stroke="#bd00ff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    
    <!-- Right bracket > (Green/Cyan glow) -->
    <path d="M 387 190 L 437 256 L 387 322" fill="none" stroke="#00ff88" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    
    <!-- Center Letters K (White) & W (Neon Gradient) -->
    <g filter="url(#glow)">
        <text x="165" y="295" font-family="'Outfit', sans-serif" font-weight="900" font-size="115" fill="#ffffff" letter-spacing="-4">K</text>
        <text x="245" y="295" font-family="'Outfit', sans-serif" font-weight="900" font-size="115" fill="url(#textGrad)" letter-spacing="-4">W</text>
    </g>
    
    <!-- Glowing Editor Blinking Cursor -->
    <rect x="345" y="200" width="12" height="85" rx="6" fill="#bd00ff" filter="url(#glow)">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>

    <!-- LITE Badge Capsule -->
    <rect x="186" y="380" width="140" height="46" rx="18" fill="#140523" stroke="#bd00ff" stroke-width="3" filter="url(#glow)" />
    <text x="256" y="412" text-anchor="middle" font-family="'Outfit', sans-serif" font-weight="800" font-size="22" fill="#00ff88" letter-spacing="3">LITE</text>
</svg>
